name: Deploy H2OTO on Server

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 18.224.65.207
          username: ec2-user
          key: ${{ secrets.DEV_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user/test-cicd
            git pull origin main

            sudo docker stop test-container || true
            sudo docker rm test-container || true

            sudo docker build -t test .
            sudo docker run -d -p 80:3000 --name test-container --restart=always test