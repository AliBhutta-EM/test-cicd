name: Deploy H2OTO on Server

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: http://18.224.65.207
          username: root
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /test-cicd
            git pull origin main
            docker build -t test
            docker run -d -p 80:3000 test